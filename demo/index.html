<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
  <title>api-type-document demo</title>
  <script type="module" src="../node_modules/marked/lib/marked.js"></script>
  <script type="module" src="../node_modules/@advanced-rest-client/arc-demo-helper/arc-demo-helper.js"></script>
  <style>
    [role="main"].centered {
      max-width: 1100px;
    }

    api-navigation {
      width: 320px;
      min-width: 320px;
      overflow: auto;
    }

    api-type-document {
      margin-left: 40px;
      flex: 1;
      flex-basis: 0.000000001px;
    }

    html,
    body {
      margin: 0 !important;
      padding: 0 !important;

      --arc-font-body1-font-size: 14px;
     --arc-font-body1-font-weight: 400;
     --arc-font-body1-line-height: 20px;
     --arc-font-code-family: 'Roboto Mono', 'Consolas', 'Menlo', monospace;
     --code-background-color: #f5f2f0;
    }

    header {
      padding: 12px 24px;
      background-color: #C5E1A5;
      display: flex;
      align-items: center;
      --iron-icon-fill-color: #3E2723;
      --paper-input-container-focus-color: #33691E;
      --paper-input-container-label: {
        color: #3E2723;
      };
    }

    .spacer {
      flex: 1;
      flex-basis: 0.000000001px;
    }

    .options {
      display: flex;
      align-items: center;
    }

    .options > * {
      margin-left: 8px;
    }

    /* Dark mode: simulates theme where union/oneOf buttons use transparent/inherit */
    body.dark-mode {
      background-color: #1e1e1e !important;
      color: #e0e0e0;
    }
    body.dark-mode header {
      background-color: #2d2d2d;
      --iron-icon-fill-color: #e0e0e0;
      --paper-input-container-focus-color: #90caf9;
      --paper-input-container-label: { color: #e0e0e0; };
    }
    body.dark-mode [role="main"] {
      background-color: #1e1e1e;
    }
    .dark-mode-toggle {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 9999;
      padding: 6px 10px;
      background: #333;
      color: #fff;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .dark-mode-toggle input { margin-right: 6px; }
    </style>
</head>

<body>
  <div id="demo"></div>
  <label class="dark-mode-toggle" title="Toggle dark mode to verify union/oneOf button visibility">
    <input type="checkbox" id="darkModeCheckbox" /> Dark mode
  </label>

  <script type="module" src="index.js"></script>

  <script>
  (function() {
    function initDarkMode() {
      var cb = document.getElementById('darkModeCheckbox');
      var stored = localStorage.getItem('api-type-document-dark-mode') === 'true';
      if (stored) {
        document.body.classList.add('dark-mode');
        if (cb) cb.checked = true;
      }
      if (cb) {
        cb.addEventListener('change', function() {
          document.body.classList.toggle('dark-mode', cb.checked);
          localStorage.setItem('api-type-document-dark-mode', cb.checked);
        });
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initDarkMode);
    } else {
      initDarkMode();
    }
  })();
  document.addEventListener('WebComponentsReady', function() {
    if (!window.ShadyCSS) {
      return;
    }
    function shouldAddDocumentStyle(n) {
      return n.nodeType === Node.ELEMENT_NODE && n.localName === 'style' && !n.hasAttribute('scope');
    }
    const CustomStyleInterface = window.ShadyCSS.CustomStyleInterface;

    const candidates = document.querySelectorAll('style');
    for (let i = 0; i < candidates.length; i++) {
      const candidate = candidates[i];
      if (shouldAddDocumentStyle(candidate)) {
        CustomStyleInterface.addCustomStyle(candidate);
      }
    }
  });
  </script>
</body>

</html>
